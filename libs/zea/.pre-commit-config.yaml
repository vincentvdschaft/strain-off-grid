############################
# Pre-commit configuration #
############################

# Install via `pip install pre-commit`

# This is run as a precondition to commits, run manually via `pre-commit run`

# When adding new hooks, it may make sense to once run
# `pre-commit run --all-files` as by default only changed files are checked

# Automatically run before every commit via once running `pre-commit install`

repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.17
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format

# ty (type checker) is run as a *local* hook using the `ty` from the active
# environment rather than the upstream astral-sh/ty-pre-commit hook. The upstream
# hook type-checks inside an isolated environment that does not contain zea's
# dependencies (keras, numpy, h5py, ...), which makes ty unable to resolve them
# and produces many false positives. Running `ty` from the active environment
# (the dev container, or a local `.venv` with `pip install -e .[dev]`) gives it
# access to the installed dependencies. `ty` is pinned via the `dev`/`tests`
# extras in pyproject.toml.
- repo: local
  hooks:
    - id: ty
      name: ty
      description: "Run 'ty' for fast Python type checking"
      entry: ty check
      language: system
      types_or: [python, pyi]
      # ty reads its file selection from [tool.ty] in pyproject.toml; changes in
      # one file can surface diagnostics in another, so check the whole project.
      pass_filenames: false
      always_run: true
      require_serial: true

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  # A bunch of other pre-defined hooks.
  - id: check-yaml
    description: Check yaml files for parseable syntax
  - id: check-added-large-files
    description: Prevent large files from being committed
    exclude: ^(docs/source/notebooks/|uv\.lock$)
  - id: check-merge-conflict
    description: Check for files that contain merge conflict strings
  - id: detect-private-key
    description: Detects the presence of private keys

- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.8.17
  hooks:
  - id: uv-lock

- repo: local
  hooks:
  - id: run-parameters-doc
    name: Run parameters_doc.py
    entry: python docs/source/parameters_doc.py
    language: system
    files: ^docs/source/parameters_doc\.py$
  - id: run-spec-doc
    name: Run spec_doc.py
    entry: python docs/source/spec_doc.py
    language: system
    files: ^(docs/source/spec_doc\.py|zea/data/spec\.py)$
    pass_filenames: false
  - id: generate-keras-ops
    name: Generate Keras Operations
    entry: python -m zea.internal._generate_keras_ops
    language: system
    files: ^(.*/)?(uv\.lock|pyproject\.toml|zea/internal/_generate_keras_ops\.py)$
    pass_filenames: false
  - id: notebook-clean-and-check
    name: Notebook Clean and Check
    entry: python docs/source/notebook_clean_and_check.py
    language: system
    files: ^docs/source/notebooks/.*\.ipynb$
    pass_filenames: true