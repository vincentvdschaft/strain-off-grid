name: Tests

on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/tue-bmd/zea/all-cpu
  MAIN_REPO: tue-bmd/zea
  HF_CACHE_HOST: /cache/huggingface
  HF_CACHE_CONTAINER: /cache/huggingface
  ZEA_CACHE_HOST: /cache/zea
  ZEA_CACHE_CONTAINER: /cache/zea

jobs:
  tag:
    uses: ./.github/workflows/set-tag.yaml

  image:
    needs: [tag]
    runs-on: ubuntu-latest
    timeout-minutes: 100
    permissions:
      contents: read
      packages: write
    outputs:
      docker_image: ${{ steps.set-image.outputs.docker_image }}
      needs_artifact: ${{ steps.set-image.outputs.needs_artifact }}
    steps:
      - name: Debug repository context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Is main repo: ${{ github.repository == 'tue-bmd/zea' }}"
          echo "Repository owner: ${{ github.repository_owner }}"
          echo "Event name: ${{ github.event_name }}"
          echo "PR head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "PR base repo: ${{ github.event.pull_request.base.repo.full_name }}"
          echo "Is fork PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fork PRs: reuse the base-branch image when only code changed, not deps/Dockerfile.
      - name: Check if image needs rebuilding (fork PR)
        id: image-check
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF"
          # Compare against the just-fetched tip (FETCH_HEAD). On the shallow
          # checkout used here the remote-tracking ref origin/$BASE_REF is not
          # updated by `git fetch origin "$BASE_REF"` and may be stale or absent.
          if git diff --quiet FETCH_HEAD -- Dockerfile pyproject.toml uv.lock; then
            # Verify the branch-tagged image actually exists before deciding to reuse it.
            # It may be absent on first run after this workflow feature was introduced.
            BASE_TAG="${{ env.BASE_IMAGE }}:${{ github.event.pull_request.base.ref }}"
            if docker manifest inspect "$BASE_TAG" > /dev/null 2>&1; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No image-relevant files changed — reusing $BASE_TAG"
            else
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Branch image $BASE_TAG not found — building locally"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Image-relevant files changed — building locally"
          fi

      # Free disk space before any docker build. Skipped for fork PRs reusing the base-branch image.
      - name: Free up disk space
        if: >
          github.event_name == 'push'
          || github.event.pull_request.head.repo.full_name == github.repository
          || steps.image-check.outputs.changed == 'true'
        run: |
          sudo rm -rf "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY" /opt/hostedtoolcache

      - name: Build and push CI Docker image
        id: build
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            INSTALL_JAX=cpu
            INSTALL_TORCH=cpu
            INSTALL_TF=cpu
            DEV=true
          push: true
          tags: ${{ env.BASE_IMAGE }}:${{ needs.tag.outputs.docker_tag }}
          cache-from: type=registry,ref=ghcr.io/tue-bmd/zea/build-cache:all-cpu
          cache-to: type=registry,ref=ghcr.io/tue-bmd/zea/build-cache:all-cpu,mode=max

      # Fork PR local build — no push. Reads registry cache (public, no auth required).
      # GHA cache write covers repeated commits to the same fork PR branch.
      - name: Build CI Docker image (fork PR)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && steps.image-check.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            INSTALL_JAX=cpu
            INSTALL_TORCH=cpu
            INSTALL_TF=cpu
            DEV=true
          push: false
          tags: zea-fork:local
          outputs: type=docker,dest=/tmp/fork-image.tar
          cache-from: type=registry,ref=ghcr.io/tue-bmd/zea/build-cache:all-cpu
          cache-to: type=gha,mode=max

      - name: Upload fork PR image artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && steps.image-check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fork-pr-image
          path: /tmp/fork-image.tar
          retention-days: 1

      - name: Set Docker image for tests
        id: set-image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            if [ "${{ steps.image-check.outputs.changed }}" = "true" ]; then
              DOCKER_IMAGE="zea-fork:local"
              NEEDS_ARTIFACT="true"
              echo "✅ Fork PR (image changed): using locally built image"
            else
              DOCKER_IMAGE="${{ env.BASE_IMAGE }}:${{ github.event.pull_request.base.ref }}"
              NEEDS_ARTIFACT="false"
              echo "✅ Fork PR (no image change): reusing $DOCKER_IMAGE"
            fi
          else
            DOCKER_IMAGE="${{ env.BASE_IMAGE }}:${{ needs.tag.outputs.docker_tag }}"
            NEEDS_ARTIFACT="false"
            echo "✅ Main repo: using $DOCKER_IMAGE"
          fi
          echo "docker_image=$DOCKER_IMAGE" >> $GITHUB_OUTPUT
          echo "needs_artifact=$NEEDS_ARTIFACT" >> $GITHUB_OUTPUT

  tests:
    needs: [image]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: git config --global safe.directory $GITHUB_WORKSPACE

      - uses: ./.github/actions/load-image
        with:
          needs_artifact: ${{ needs.image.outputs.needs_artifact }}
          docker_image: ${{ needs.image.outputs.docker_image }}

      - name: Run Pytest in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -w /zea \
            ${{ needs.image.outputs.docker_image }} \
            sh -c "uv pip install --system -e .[tests] && pytest --cov --cov-branch --cov-report=xml -p no:cacheprovider -m 'not heavy and not notebook' ./tests"

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ env.MAIN_REPO }}
          flags: unit

  # Guard against zea accidentally using functionality newer than the dependency
  # floors declared in pyproject.toml. Installs the *lowest* allowed versions of
  # zea's declared deps and runs the import tests against them.
  minimum-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Lowest Python we support (see requires-python in pyproject.toml).
          python-version: "3.10"

      - name: Install zea at lowest declared dependency versions
        env:
          UV_TORCH_BACKEND: cpu
        run: |
          uv venv
          uv pip install --resolution lowest-direct -e ".[tests]" \
            "tensorflow-cpu>=2.12.1" "jax[cpu]>=0.4.35" "torch>=2.2"
          echo "::group::Resolved dependency versions"
          uv pip freeze
          echo "::endgroup::"

      - name: Run import tests against minimum dependencies
        # --no-sync: run in the floor-pinned venv as-is; never re-resolve to the
        # default (highest) versions, which would defeat the guard.
        # Only the import tests run here: this job exists to catch usage of APIs
        # newer than the declared dependency floors, which surfaces at import time.
        run: uv run --no-sync pytest -p no:cacheprovider ./tests/test_imports.py

  heavy-tests:
    needs: [image]
    runs-on: self-hosted
    timeout-minutes: 120
    concurrency:
      group: heavy-tests-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/load-image
        with:
          needs_artifact: ${{ needs.image.outputs.needs_artifact }}
          docker_image: ${{ needs.image.outputs.docker_image }}

      - name: Run heavy tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -v $HF_CACHE_HOST:$HF_CACHE_CONTAINER \
            -v $ZEA_CACHE_HOST:$ZEA_CACHE_CONTAINER \
            -e HF_HOME=$HF_CACHE_CONTAINER \
            -e HUGGINGFACE_HUB_CACHE=$HF_CACHE_CONTAINER \
            -e ZEA_CACHE_DIR=$ZEA_CACHE_CONTAINER \
            -w /zea \
            ${{ needs.image.outputs.docker_image }} \
            sh -lc "pytest --cov --cov-branch --cov-report=xml -p no:cacheprovider -m 'heavy' ./tests"

      - name: Upload heavy test results to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ env.MAIN_REPO }}
          flags: heavy

  notebook-tests:
    name: notebook-tests (${{ matrix.label }})
    needs: [image]
    runs-on: self-hosted
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            dirs: agent
            label: agent
          - name: models
            dirs: models
            label: models
          - name: pipeline
            dirs: pipeline
            label: pipeline
          - name: data-metrics
            dirs: "data metrics"
            label: data+metrics
    concurrency:
      group: notebook-tests-${{ matrix.name }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/load-image
        with:
          needs_artifact: ${{ needs.image.outputs.needs_artifact }}
          docker_image: ${{ needs.image.outputs.docker_image }}

      - name: Run ${{ matrix.name }} notebook tests
        run: |
          DIRS_ARGS=$(echo "${{ matrix.dirs }}" | tr ' ' '\n' | sed 's/^/--notebook-dir /' | tr '\n' ' ')
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -v ${{ env.HF_CACHE_HOST }}:${{ env.HF_CACHE_CONTAINER }} \
            -v ${{ env.ZEA_CACHE_HOST }}:${{ env.ZEA_CACHE_CONTAINER }} \
            -e HF_HOME=${{ env.HF_CACHE_CONTAINER }} \
            -e HUGGINGFACE_HUB_CACHE=${{ env.HF_CACHE_CONTAINER }} \
            -e ZEA_CACHE_DIR=${{ env.ZEA_CACHE_CONTAINER }} \
            -w /zea \
            ${{ needs.image.outputs.docker_image }} \
            sh -lc "pytest -p no:cacheprovider -s -m 'notebook' $DIRS_ARGS"

  test-docs-build:
    needs: [image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: git config --global safe.directory $GITHUB_WORKSPACE

      - uses: ./.github/actions/load-image
        with:
          needs_artifact: ${{ needs.image.outputs.needs_artifact }}
          docker_image: ${{ needs.image.outputs.docker_image }}

      - name: Build documentation with Sphinx (fails on warnings)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -w /zea/docs \
            ${{ needs.image.outputs.docker_image }} \
            sh -c "\
              uv pip install --system -e ..[docs] && \
              export PATH=\"/tmp/.local/bin:\$PATH\" && \
              export ZEA_LOG_LEVEL=ERROR && \
              make docs-clean && \
              make docs-build SPHINXOPTS='-W --keep-going' && \
              make docs-test \
            "
